name: Update Dashboard Data

on:
  schedule:
    # Every 30 minutes during market hours (Mon-Fri 14:00-22:00 UTC = EU/US overlap)
    - cron: '0,30 14-22 * * 1-5'
    # Once overnight to catch Asian session
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Fetch z-scores
        run: python fetch_zscores.py

      - name: Commit data
        run: |
          git config --global user.name  "Dashboard Bot"
          git config --global user.email "dashboard-bot@users.noreply.github.com"
          git add data/zscores.json
          git diff --staged --quiet && echo "No change" && exit 0
          git commit -m "Z-score update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
